# Image build pipeline for tor-dice.
#
# Pattern mirrors rpg-dice-mcp-docker (homelab Go service shape):
# in-cluster ARC runner + Infisical secrets + Harbor push. Multi-stage
# Dockerfile builds the Svelte SPA, embeds into the Go binary, ships
# as a scratch-based image.
#
# Prerequisite: the `tor-dice-docker-runner` ARC scale set must be
# provisioned via dvystrcil/argocd-projects:arc/arc-build-runners.yaml.

name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.github/CODEOWNERS'
  pull_request:
  workflow_dispatch:

env:
  INTERNAL_REGISTRY: harbor-core.harbor.svc.cluster.local
  PROJECT: ai
  IMAGE_NAME: tor-dice

jobs:
  test:
    runs-on: tor-dice-docker-runner
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: go test
        # No -race here: requires cgo, but our build is CGO_ENABLED=0
        # for a static binary, and the ARC runner is alpine-without-gcc.
        run: |
          # The //go:embed directive requires web/dist/ to exist. A
          # placeholder is checked into the repo; for `go test` we
          # don't need the real Svelte build because the tests don't
          # exercise the static-FS handler with real content.
          go test -cover ./...

  build:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: tor-dice-docker-runner
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: prod
          project-slug: homelab-bz-gt
          secret-path: /
          export-type: env
          domain: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080

      - name: Log in to Harbor (internal)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.INTERNAL_REGISTRY }}
          username: ${{ env.HB_USERNAME }}
          password: ${{ env.HB_PASSWORD }}

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ env.CICD_APP_CLIENT_ID }}
          private-key: ${{ env.CICD_APP_PRIVATE_KEY }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."harbor-core.harbor.svc.cluster.local"]
              ca=["/etc/ssl/certs/ca-certificates.crt"]

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=sha-

      - name: Build + push (dev image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
